<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weazel News Recruitment</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

/* background slideshow */

.slideshow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slideShow 25s infinite;
}

.slideshow img:nth-child(1){animation-delay:0s;}
.slideshow img:nth-child(2){animation-delay:6s;}
.slideshow img:nth-child(3){animation-delay:12s;}
.slideshow img:nth-child(4){animation-delay:18s;}
.slideshow img:nth-child(5){animation-delay:24s;}
.slideshow img:nth-child(6){animation-delay:30s;}
.slideshow img:nth-child(7){animation-delay:36s;}

@keyframes slideShow{

0%{opacity:0;}
5%{opacity:1;}
20%{opacity:1;}
25%{opacity:0;}
100%{opacity:0;}

}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

/* main container */

.container{

width:95%;
max-width:850px;

display:flex;
flex-wrap:wrap;

border-radius:20px;

overflow:hidden;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

box-shadow:0 20px 50px rgba(0,0,0,0.7);

animation:fadeUp 1s ease;
}

/* left panel */

.left{
flex:1;
min-width:260px;
padding:30px;
color:white;
text-align:center;
border-right:1px solid rgba(255,255,255,0.2);
}

.logo{
width:180px;
margin-bottom:15px;
}

.editor-img{

width:140px;
height:140px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

margin-top:10px;

box-shadow:0 0 20px rgba(0,0,0,0.6);

animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

.title{
font-size:26px;
font-weight:bold;
margin-top:15px;
}

.subtitle{
font-size:14px;
opacity:0.85;
}

/* form area */

.right{
flex:1;
min-width:300px;
padding:35px;
}

input,select{

width:100%;
padding:12px;

margin:8px 0;

border:none;

border-radius:10px;

background:rgba(255,255,255,0.9);

outline:none;

transition:0.3s;
}

input:focus,select:focus{

transform:scale(1.03);

box-shadow:0 0 10px #00eaff;
}

/* button */

button{

width:100%;

padding:13px;

margin-top:12px;

border:none;

border-radius:10px;

background:linear-gradient(45deg,#ff3d3d,#ff0000);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:scale(1.05);

box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* success message */

.success{

display:none;

color:#00ffb3;

text-align:center;

margin-top:10px;

font-weight:bold;
}

/* animation */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<!-- slideshow background -->

<div class="slideshow">

<img src="slide.jpg">
<img src="slide1.webp">
<img src="slide2.png">
<img src="slide3.png">
<img src="slide4.jpg">
<img src="slide5.jpg">
<img src="slide6.jpg">

</div>


<div class="container">

<div class="left">

<img src="logo.png" class="logo">

<div class="title">Weazel News</div>

<div class="subtitle">Official Recruitment Portal</div>

<img src="editor.jpg" class="editor-img">

<p style="margin-top:15px">

Editor in Chief<br>

<strong>Sheikh Tamim</strong>

</p>

</div>


<div class="right">

<form id="newsForm">

<input name="cid" placeholder="CID" required>

<input name="phone" placeholder="Phone Number" required>

<input name="dtag" placeholder="Discord Tag (user#1234)" required>

<input name="dname" placeholder="Discord Name" required>

<input name="gpu" placeholder="Graphic Card Specification" required>

<select name="position" required>

<option value="">Select Position</option>

<option>Cameraman</option>

<option>Reporter</option>

</select>

<button type="submit">Submit Application</button>

</form>

<div class="success" id="successMsg">

Application Submitted Successfully ✅

</div>

</div>

</div>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzCpzF2IHRrZtfS7BgI2DPRpAVGUGIzmtt-haH23mCwY3IoZ0PgcYKKrkwkoW7l2X93/exec"

const form=document.getElementById("newsForm")

form.addEventListener("submit",e=>{

e.preventDefault()

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(()=>{
document.getElementById("successMsg").style.display="block"
form.reset()
})
.catch(()=>alert("Submission error"))

})

</script>

</body>
</html>
